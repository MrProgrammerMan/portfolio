name: Update host

on:
  workflow_dispatch:
    inputs:
      environment:
        type: environment
        description: 'Deployment environment'
        required: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    environment: 
      name: ${{ inputs.environment }}
    env:
      TARGET_HOST: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v6
    
      - name: Set up Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-25.11
      
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_ROOT_KEY }}" > ~/.ssh/ed25519
          chmod 600 ~/.ssh/ed25519
          ssh-keyscan -H ${{ secrets.IP_ADDRESS }} >> ~/.ssh/known_hosts
          echo "${{ secrets.SSH_AGENIX_KEY }}" > ~/.ssh/agenix
          chmod 600 ~/.ssh/agenix

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Encrypt secrets with agenix
        env:
          ALL_VARS: ${{ toJSON(vars) }}
          ALL_SECRETS: ${{ toJSON(secrets) }}
        run: |
          set -euo pipefail
          cp deployment/.env.template .env.rendered

          # Replace ${vars.KEY} from ALL_VARS
          jq -r 'to_entries[] | "\(.key)\t\(.value)"' <<< "$ALL_VARS" | \
          while IFS=$'\t' read -r k v; do
            sed -i "s|\${vars\.${k}}|${v}|g" .env.rendered
          done

          # Replace ${secrets.KEY} from ALL_SECRETS
          jq -r 'to_entries[] | "\(.key)\t\(.value)"' <<< "$ALL_SECRETS" | \
          while IFS=$'\t' read -r k v; do
            sed -i "s|\${secrets\.${k}}|${v}|g" .env.rendered
          done

          cd deployment/secrets
          rm -f .env.age
          nix run github:ryantm/agenix -- -e .env.age -i ~/.ssh/agenix < ../../.env.rendered
          shred -u ../../.env.rendered

          if [[ ! -s .env.age ]]; then
            echo "ERROR: .env.age was not created or is empty" && exit 1
          fi
          echo "Successfully created .env.age ($(wc -c < .env.age) bytes)"

      - name: Commit encrypted secrets
        run: |
          git add .
          git commit -m "actions($TARGET_HOST): Update encrypted secrets for $TARGET_HOST"
      
      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push

      - name: Resolve deployment ref
        id: deployment_ref
        run: |
          set -euo pipefail
          echo "ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Rebuild host to finished config
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.IP_ADDRESS }}
          username: root
          key: ${{ secrets.SSH_ROOT_KEY }}
          script: |
            set -euo pipefail
            nixos-rebuild switch --show-trace --flake github:${{ github.repository }}/${{ steps.deployment_ref.outputs.ref }}?dir=deployment#${{ inputs.environment }}