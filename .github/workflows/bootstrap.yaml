name: Bootstrap host

on:
  workflow_dispatch:
    inputs:
      environment:
        type: environment
        description: 'Deployment environment'
        required: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: 
      name: ${{ inputs.environment }}
    env:
      TARGET_HOST: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v6
    
      - name: Set up Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_ROOT_KEY }}" > ~/.ssh/ed25519
          chmod 600 ~/.ssh/ed25519
          ssh-keyscan -H ${{ secrets.IP_ADDRESS }} >> ~/.ssh/known_hosts
      
      - name: Create host config from bootstrap template
        run: |
          mkdir -p modules/hosts/$TARGET_HOST

          sed -e '/^[[:space:]]*#/d' \
            -e "s/bootstrapConfig/$TARGET_HOST/" \
            modules/hosts/bootstrap/configuration.nix > modules/hosts/$TARGET_HOST/configuration.nix

          sed -e '/^[[:space:]]*#/d' \
            -e "s/bootstrapConfig/$TARGET_HOST/" \
            modules/nixosModules/bootstrap-specific.nix > modules/nixosModules/$TARGET_HOST-specific.nix

      - name: Configure git
        if: ${{ !env.ACT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Commit host config
        if: ${{ !env.ACT }}
        run: |
          git add .
          git commit -m "actions($TARGET_HOST): Add configuration for $TARGET_HOST"

      - name: Track config for act tests(flake doesn't work with untracked files)
        if: ${{ env.ACT }}
        run: |
          git add .
      
      - name: Run nixos-anywhere
        run: |
          nix run github:nix-community/nixos-anywhere \
            -- --generate-hardware-config nixos-generate-config ./modules/hosts/$TARGET_HOST/_hardware-configuration.nix \
            --flake .#$TARGET_HOST \
            --target-host root@${{ secrets.IP_ADDRESS }} \
            -i ~/.ssh/ed25519

      - name: Commit hardware configuration
        if: ${{ !env.ACT }}
        run: |
          git add .
          git commit -m "actions($TARGET_HOST): Add hardware configuration for $TARGET_HOST"

      - name: Copy host ssh key for agenix access
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.IP_ADDRESS }}
          username: root
          key: ${{ secrets.SSH_ROOT_KEY }}
          port: 22
          source: /etc/ssh/ssh_host_ed25519_key.pub
          target: ./
        
      - name: Add host ssh key to agenix keys
        if: ${{ !env.ACT }}
        run: |
          NEW_KEY=$(cat ./etc/ssh/ssh_host_ed25519_key.pub | tr -d '\n')
          sed -i "s|^]|  \"${NEW_KEY}\"\n]|" ./secrets/keys.nix
          rm -rf ./etc

      - name: Commit agenix key changes
        if: ${{ !env.ACT }}
        run: |
          git add .
          git commit -m "actions($TARGET_HOST): Add $TARGET_HOST ssh key to agenix keys"
      
      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: ${{ !env.ACT }}
        run: |
          git push